version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: notes_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-notes_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # Use the ECR image instead of 'build'
    image: ${ECR_REGISTRY}/${BACKEND_REPO}:latest
    container_name: backend_container
    ports:
      - "5000:5000"
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: notes_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    # Use the ECR image instead of 'build'
    image: ${ECR_REGISTRY}/${FRONTEND_REPO}:latest
    container_name: frontend_container
    ports:
      - "80:3000" # Mapping port 80 (standard web) to 3000 inside container
    depends_on:
      - backend

volumes:
  postgres_data:
